                request.onreadystatechange = function () {

                    if (request.readyState == 4 && request.status == 200) {
                        if (JSON.parse(request.responseText).d == "login") {
                           
                        }
                        else {
                         
                            var xmlDoc = $.parseXML(JSON.parse(request.responseText).d);

        function Minuscart() {
            const inputField = document.getElementById('txtqty');

            if (currentValue == 1) {

            }

                inputField.value = currentValue - 1;
            }

        function Pluscart() {
            const inputField = document.getElementById('txtqty');

                inputField.value = 10;
            }
            else {
                inputField.value = currentValue + 1;
            }

        function AddWish(a) {
         
            var request;
            if (window.XMLHttpRequest) {

            else if (window.ActiveXObject) {
                //Old IE Browsers.

            if (request != null) {
                var url = "Product-category1.aspx/AddWish";
                request.open("POST", url, false);
                var params = "{name: '" + a + "'}";
                request.setRequestHeader("Content-Type", "application/json");
                request.onreadystatechange = function () {

        }
